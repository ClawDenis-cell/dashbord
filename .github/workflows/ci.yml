name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ./backend/package.json
    
    - name: Install dependencies
      run: npm install
    
    - name: Build TypeScript
      run: npm run build
    
    - name: Check build output
      run: |
        ls -la dist/
        test -f dist/index.js || (echo "dist/index.js not found!" && exit 1)
    
    - name: Upload dist artifact
      uses: actions/upload-artifact@v4
      with:
        name: backend-dist
        path: backend/dist/

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ./frontend/package.json
    
    - name: Install dependencies
      run: npm install
    
    - name: Build frontend
      run: npm run build
    
    - name: Upload dist artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist/

  docker-build:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
    - uses: actions/checkout@v4
    
    - name: Download backend dist
      uses: actions/download-artifact@v4
      with:
        name: backend-dist
        path: backend/dist/
    
    - name: Download frontend dist
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist/
    
    - name: Verify dist files
      run: |
        ls -la backend/dist/
        ls -la frontend/dist/
        test -f backend/dist/index.js || (echo "backend/dist/index.js not found!" && exit 1)
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker images
      run: |
        docker compose build
    
    - name: Test Docker containers start
      run: |
        docker compose up -d
        sleep 10
        docker compose ps
        curl -f http://localhost:3001/health || (echo "Backend health check failed!" && exit 1)
    
    - name: Cleanup
      if: always()
      run: docker compose down -v
